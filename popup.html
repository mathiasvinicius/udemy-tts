<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Udemy Transcript TTS</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="compact">
    <main class="panel">
      <div class="header">
        <div>
          <h1>Udemy TTS</h1>
          <p class="subtitle">Leitura sincronizada com o player</p>
        </div>
        <button id="openConfigBtn" type="button" class="iconBtn" title="Configurações" aria-label="Configurações">⚙️</button>
      </div>

      <label class="row toggle">
        <span>Ativar</span>
        <input id="enabled" type="checkbox" />
      </label>

      <label class="stack">
        <span>Fonte</span>
        <select id="sourceMode">
          <option value="track">Legenda do player</option>
          <option value="transcript">Painel de transcrição</option>
        </select>
      </label>

      <label class="stack">
        <span>Voz</span>
        <select id="voice"></select>
      </label>

      <label class="stack">
        <span>Velocidade (<output id="rateOut">1.0</output>)</span>
        <input id="rate" type="range" min="0.5" max="2" step="0.1" />
      </label>

      <label class="row">
        <span>Modo automático (acelera se atrasar)</span>
        <input id="autoRate" type="checkbox" />
      </label>

      <label class="stack">
        <span>Volume (<output id="volumeOut">1.0</output>)</span>
        <input id="volume" type="range" min="0" max="1" step="0.1" />
      </label>

      <label class="row">
        <span>Debug</span>
        <input id="debug" type="checkbox" />
      </label>

      <p id="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
